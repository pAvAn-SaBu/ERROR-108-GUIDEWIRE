<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>REVO | Join the Shield</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; }
        .bg-saffron-gradient { background: linear-gradient(135deg, #a83300 0%, #d24200 100%); }
        input:focus { outline: none; border-color: #a83300 !important; box-shadow: 0 0 0 4px rgba(168, 51, 0, 0.05); }
    </style>
    <script src="js/app.js"></script>
</head>
<body class="bg-surface text-on-surface flex items-center justify-center min-h-screen p-6">
    <div class="w-full max-w-md space-y-12 text-center">
        <!-- Logo -->
        <div class="flex items-center justify-center gap-2 cursor-pointer" onclick="location.href='landing.html'">
            <span class="material-symbols-outlined text-orange-600 text-4xl font-black" style="font-variation-settings: 'FILL' 1;">analytics</span>
            <h1 class="text-3xl font-black tracking-tighter">REVO</h1>
        </div>

        <div class="space-y-4">
            <h2 id="auth-title" class="text-4xl font-black tracking-tight">Join the Shield.</h2>
            <p class="text-sm text-neutral-400 font-medium tracking-wide">Sign in to your parametric dashboard.</p>
        </div>

        <!-- Auth Card -->
        <div class="bg-white p-10 rounded-[3.5rem] shadow-2xl border border-gray-100 space-y-8">
            <div class="space-y-6 text-left">
                <div id="name-field" class="space-y-2">
                    <label class="text-[10px] font-black uppercase tracking-[0.2em] text-neutral-400 ml-6">Full Name</label>
                    <input type="text" id="auth-name" placeholder="Your name" class="w-full px-8 py-5 bg-gray-50 border border-gray-100 rounded-3xl font-bold text-gray-900 transition-all">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase tracking-[0.2em] text-neutral-400 ml-6">Email Address</label>
                    <input type="email" id="auth-email" placeholder="name@company.com" class="w-full px-8 py-5 bg-gray-50 border border-gray-100 rounded-3xl font-bold text-gray-900 transition-all">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase tracking-[0.2em] text-neutral-400 ml-6">Password</label>
                    <input type="password" placeholder="••••••••" class="w-full px-8 py-5 bg-gray-50 border border-gray-100 rounded-3xl font-bold text-gray-900 transition-all">
                </div>
            </div>

            <button id="auth-submit" class="w-full bg-saffron-gradient text-white py-6 rounded-[2rem] font-black text-sm uppercase tracking-widest hover:scale-[1.02] active:scale-[0.98] transition-all shadow-xl shadow-orange-100">
                Create Account
            </button>

            <div class="pt-4">
                <a href="#" id="auth-toggle" class="text-[11px] font-black uppercase tracking-widest text-orange-600 hover:opacity-70 transition-opacity">
                    Already have an account? Sign In
                </a>
            </div>
        </div>

        <p class="text-[10px] font-bold text-neutral-300 uppercase tracking-widest">Powered by 6-Signal AI Verification</p>
    </div>
</body>
</html>
